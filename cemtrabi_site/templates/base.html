{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cemtrabi{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link rel="apple-touch-icon" href="{% static 'images/favicon.png' %}">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="header">
    <div class="header-inner">

        <div class="logo-area">
    <a href="{% url 'home' %}">
        <img src="{% static 'images/logo.png' %}" alt="CEMTRABI" class="logo-img">
    </a>
</div>

        <!-- BOTÃO HAMBURGER -->
        <button class="hamburger" id="hamburger" type="button" aria-label="Abrir menu de navegação" aria-expanded="false" aria-controls="menu">
            ☰
        </button>

        <nav class="menu" id="menu">
            <a href="{% url 'home' %}">Inicio</a>
            <a href="{% url 'medicina' %}">Medicina Ocupacional</a>
            <a href="{% url 'seguranca' %}">Segurança do Trabalho</a>
            <a href="{% url 'treinamentos' %}">Treinamentos</a>
            <a href="{% url 'encaminhamento' %}">Encaminhamento</a>
            <a href="https://sistema.soc.com.br/WebSoc/" target="_blank" rel="noopener noreferrer">ASO</a>
            <a href="{% url 'sobre' %}">Sobre Nós</a>
        </nav>

    </div>
</header>

<div id="overlay" aria-hidden="true"></div>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<footer class="footer">
    <p>Cemtrabi — Soluções em Medicina e Segurança do Trabalho</p>
    <a class="footer-link" href="{% url 'politica_privacidade' %}">Política de Privacidade</a>
</footer>

<a
    class="whatsapp-float"
    href="https://wa.me/5521975204123?text=Ol%C3%A1%2C%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es%20sobre%20os%20servi%C3%A7os%20da%20CEMTRABI."
    target="_blank"
    rel="noopener"
    aria-label="Falar com a CEMTRABI pelo WhatsApp"
>
    <img src="{% static 'images/whatsapp_logo_icon.png' %}" alt="" aria-hidden="true">
</a>

<!-- JS -->
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
